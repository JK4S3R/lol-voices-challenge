<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoL Voices</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-wrapper">
        <div class="game-container">
            <h1>LoL Voices</h1>

            <div id="game-info">
                <div class="timer-container">
                    <div id="timer-bar"></div>
                </div>
                <button id="reset-btn" title="Recommencer">🔄</button>
                <div class="info-box">🏆 <span id="streak-display">0</span></div>
            </div>

            <!-- Zone de setup : langue + difficulté -->
            <div id="setup-area">
                <div class="setup-group">
                    <span class="setup-label" id="lang-label">Langue</span>
                    <div class="btn-group">
                        <button id="btn-fr" class="active">FR</button>
                        <button id="btn-en">EN</button>
                    </div>
                </div>

                <div class="setup-group">
                    <span class="setup-label" id="diff-label">Difficulté</span>
                    <div class="btn-group">
                        <button id="btn-easy" class="active">Facile</button>
                        <button id="btn-hard">Difficile</button>
                    </div>
                    <span class="diff-desc" id="easy-desc">Sons de sélection uniquement</span>
                    <span class="diff-desc" id="hard-desc" style="display:none"></span>
                </div>
            </div>

            <p id="feedback"></p>

            <button id="start-btn">🎮 Démarrer la partie</button>

            <div id="game-area" style="display: none;">
                <button id="play-btn">🔊 Réécouter</button>

                <div class="input-group">
                    <div class="autocomplete-wrapper">
                        <input type="text" id="user-input" autocomplete="off" spellcheck="false" placeholder="Nom du champion...">
                        <div id="autocomplete-list" class="autocomplete-items"></div>
                    </div>
                    <button id="check-btn">Vérifier</button>
                    <button id="skip-btn">Passer ⏭️</button>
                </div>
            </div>

            <img id="champ-image" src="" alt="Champion" style="display: none;">
            <audio id="voice-player"></audio>
        </div>

        <div class="history-container">
            <h3>Champions trouvés</h3>
            <div id="champions-history"></div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Gestion affichage description difficulté
        document.getElementById('btn-easy').addEventListener('click', () => {
            document.getElementById('easy-desc').style.display = '';
            document.getElementById('hard-desc').style.display = 'none';
        });
        document.getElementById('btn-hard').addEventListener('click', () => {
            document.getElementById('easy-desc').style.display = 'none';
            document.getElementById('hard-desc').style.display = '';
        });
    </script>
</body>
</html>
