<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoL Voices</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="preconnect" href="https://raw.communitydragon.org">
    <link rel="preconnect" href="https://rufkhrfwmfkzsmzxhgeg.supabase.co">

    <!-- SVG icons inline defs -->
    <svg style="display:none" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <!-- Play épuré outline -->
            <symbol id="icon-sword" viewBox="0 0 24 24">
                <polygon points="7,4 21,12 7,20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
            </symbol>
            <!-- Son / haut-parleur -->
            <symbol id="icon-sound" viewBox="0 0 24 24">
                <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z" fill="currentColor"/>
                <path d="M14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77 0-4.28-2.99-7.86-7-8.77z" fill="currentColor"/>
            </symbol>
            <!-- Refresh / reset -->
            <symbol id="icon-refresh" viewBox="0 0 24 24">
                <path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" fill="currentColor"/>
            </symbol>
            <!-- Trophée / score -->
            <symbol id="icon-trophy" viewBox="0 0 24 24">
                <path d="M19 5h-2V3H7v2H5c-1.1 0-2 .9-2 2v1c0 2.55 1.92 4.63 4.39 4.94.63 1.5 1.98 2.63 3.61 2.96V19H7v2h10v-2h-4v-3.1c1.63-.33 2.98-1.46 3.61-2.96C19.08 12.63 21 10.55 21 8V7c0-1.1-.9-2-2-2zM5 8V7h2v3.82C5.84 10.4 5 9.3 5 8zm14 0c0 1.3-.84 2.4-2 2.82V7h2v1z" fill="currentColor"/>
            </symbol>
            <!-- Skip / suivant -->
            <symbol id="icon-skip" viewBox="0 0 24 24">
                <path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z" fill="currentColor"/>
            </symbol>
            <!-- Check / vérifier -->
            <symbol id="icon-check" viewBox="0 0 24 24">
                <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z" fill="currentColor"/>
            </symbol>
            <!-- Dashboard -->
            <symbol id="icon-dashboard" viewBox="0 0 24 24">
                <path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z" fill="currentColor"/>
            </symbol>
            <!-- Logout -->
            <symbol id="icon-logout" viewBox="0 0 24 24">
                <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5-5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z" fill="currentColor"/>
            </symbol>
            <!-- Google logo -->
            <symbol id="icon-google" viewBox="0 0 24 24">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </symbol>
            <!-- Home / menu -->
            <symbol id="icon-home" viewBox="0 0 24 24">
                <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" fill="currentColor"/>
            </symbol>
        </defs>
    </svg>
</head>
<body>

    <!-- MODAL DASHBOARD -->
    <div id="dashboard-modal" style="display:none;">
        <div class="modal-box">
            <div class="modal-header">
                <h2>Mon dashboard</h2>
                <button id="close-dashboard" class="close-btn">✕</button>
            </div>
            <div id="dashboard-content"></div>
        </div>
    </div>

    <div class="main-wrapper">

        <!-- LEADERBOARD -->
        <div class="leaderboard-container">
            <h3>
                <svg class="btn-icon" style="width:11px;height:11px;margin-right:6px"><use href="#icon-trophy"/></svg>
                Classement
            </h3>
            <div id="lb-category" class="lb-category">FR · Facile</div>
            <div id="leaderboard-list">
                <p class="lb-loading">Chargement...</p>
            </div>
        </div>

        <div class="game-container">

            <div class="header-row">
                <h1>LoL Voices</h1>
                <div class="auth-area">
                    <div id="user-info" style="display:none;">
                        <img class="user-avatar" src="" alt="" style="display:none;">
                        <span class="user-name"></span>
                    </div>
                    <button id="dashboard-btn" style="display:none;">
                        <svg class="btn-icon"><use href="#icon-dashboard"/></svg>
                        Mon dashboard
                    </button>
                    <button id="login-btn">
                        <svg class="btn-icon"><use href="#icon-google"/></svg>
                        Se connecter
                    </button>
                    <button id="logout-btn" style="display:none;">
                        <svg class="btn-icon"><use href="#icon-logout"/></svg>
                        Déconnexion
                    </button>
                </div>
            </div>

            <div id="game-info">
                <div class="timer-container">
                    <div id="timer-bar"></div>
                </div>
                <div id="timer-display">1:30</div>
                <button id="menu-btn" title="Retour au menu">
                    <svg class="btn-icon"><use href="#icon-home"/></svg>
                </button>
                <button id="reset-btn" title="Recommencer">
                    <svg class="btn-icon"><use href="#icon-refresh"/></svg>
                </button>
                <div class="info-box">
                    <svg class="btn-icon"><use href="#icon-trophy"/></svg>
                    <span id="streak-display">0</span>
                </div>
            </div>

            <div id="setup-area">
                <div class="setup-group">
                    <span class="setup-label">Voix</span>
                    <div class="btn-group">
                        <button id="btn-fr" class="active">FR</button>
                        <button id="btn-en">EN</button>
                    </div>
                </div>
                <div class="setup-group">
                    <span class="setup-label">Difficulté</span>
                    <div class="btn-group">
                        <button id="btn-easy" class="active">Facile</button>
                        <button id="btn-hard">Difficile</button>
                    </div>
                    <span class="diff-desc" id="easy-desc">Sons de sélection uniquement</span>
                    <span class="diff-desc" id="hard-desc" style="display:none"></span>
                </div>
            </div>

            <p id="feedback"></p>

            <button id="start-btn">
                <svg class="btn-icon"><use href="#icon-sword"/></svg>
                Démarrer la partie
            </button>

            <div id="game-area" style="display: none;">
                <div class="game-topbar">
                    <button id="menu-btn" title="Retour au menu">
                        <svg class="btn-icon"><use href="#icon-home"/></svg>
                    </button>
                    <button id="play-btn">
                    <svg class="btn-icon"><use href="#icon-sound"/></svg>
                    Réécouter
                </button>
                </div>
                <div class="input-group">
                    <div class="autocomplete-wrapper">
                        <input type="text" id="user-input" autocomplete="off" spellcheck="false" placeholder="Nom du champion...">
                        <div id="autocomplete-list" class="autocomplete-items"></div>
                    </div>
                    <button id="check-btn">
                        <svg class="btn-icon"><use href="#icon-check"/></svg>
                        Vérifier
                    </button>
                    <button id="skip-btn">
                        <svg class="btn-icon"><use href="#icon-skip"/></svg>
                        Passer
                    </button>
                </div>
            </div>

            <img id="champ-image" src="" alt="Champion" style="display: none;">
            <audio id="voice-player"></audio>
        </div>

        <div class="history-container">
            <h3><svg class="btn-icon" style="width:11px;height:11px;margin-right:4px"><use href="#icon-trophy"/></svg>Trouvés</h3>
            <div id="champions-history"></div>
        </div>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js" defer></script>
    <script src="script.js" defer></script>
    <script>
        document.getElementById('btn-easy').addEventListener('click', () => {
            document.getElementById('easy-desc').style.display = '';
            document.getElementById('hard-desc').style.display = 'none';
        });
        document.getElementById('btn-hard').addEventListener('click', () => {
            document.getElementById('easy-desc').style.display = 'none';
            document.getElementById('hard-desc').style.display = '';
        });
    </script>
</body>
</html>
